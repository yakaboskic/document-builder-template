# Manifest for this version of the manuscript. One YAML file drives the
# whole build: metadata, section ordering, variables (with provenance),
# figures, and tables.

metadata:
  title: "A Starter Manuscript Built with document-sanity"
  authors:
    - name: "First Author"
      email: "first.author@example.edu"
      affiliations: [1]
    - name: "Second Author"
      email: "second.author@example.edu"
      affiliations: [1, 2]
  affiliations:
    1:
      department: "Department of Research"
      institution: "Example University"
    2:
      department: "Department of Collaboration"
      institution: "Partner Institute"
  abstract: |
    We analyzed {{NUM_SAMPLES:,}} samples and found a significant effect
    ($p = {{PVAL:.2e}}$, R<sup>2</sup> = {{R2:.2f}}). This abstract
    demonstrates the \{\{VARIABLE\}\} token substitution syntax; see the
    sections for more examples.
  keywords: [example, template, markdown, document-sanity]
  template: article            # loads templates/article.tex
  word_template: article       # loads templates/article.docx (header, footer, watermark, styles)
  word_styles: article         # loads styles/article.yaml (overrides extracted)
  html_styles: article         # loads styles/article.css (after the inline <style>)
  # render: true               # set to false for proposals etc. — skips the
                               # auto-rendered title/authors/abstract block.

# Order in which sections render. Pseudo-sections:
#   _bibliography → inserts \bibliography{references} at this position
#   _toc          → inserts \tableofcontents at this position
sections:
  - docs/introduction.md
  - docs/methods.md
  - docs/results.md
  - docs/discussion.md
  - _bibliography

# Variables referenced from markdown with {{NAME}} or {{NAME:fmt}} syntax.
# Two forms: `NAME: value` is the simple form; the full form adds a
# `provenance:` block that powers the HTML viewer's side panel.
variables:
  # Simple form — just a value.
  NUM_SAMPLES: 1247

  # Full form — value plus provenance. Click this variable in the HTML
  # viewer to see the graph.
  PVAL:
    value: 0.0087
    provenance:
      description: >
        P-value of the primary hypothesis test (two-sided), after
        Benjamini–Hochberg adjustment across 12 tested phenotypes.
      source: data/analysis_results.parquet
      data:
        - data/raw_measurements.csv
        - data/phenotype_metadata.tsv
      command: python scripts/primary_test.py --out data/analysis_results.parquet
      updated: "2026-04-21"

  R2:
    value: 0.87
    provenance:
      description: Coefficient of determination from the fitted regression model.
      source: data/analysis_results.parquet
      command: python scripts/primary_test.py --out data/analysis_results.parquet
      updated: "2026-04-21"

# Figures are resolved from src/<ver>/figures/<id>/<id>.{ext}. When
# multiple formats exist the builder picks the best per target (PDF
# prefers pdf, HTML prefers html, preview prefers png).
figures:
  example:
    width: "\\textwidth"
    # No explicit `source:` — the builder auto-scans figures/example/ and
    # picks the best file per target (pdf prefers .png, html prefers .html
    # then .svg, word prefers raster, etc.).

# Tables: two ways to handle them.
#
# 1. Inline markdown pipe tables in your .md docs — best for small,
#    presentation-only tables that don't need a separate data source.
#
# 2. Declare here with `source:` pointing at a file in tables/, and
#    reference from markdown with `{{tab:<id>}}`. The token expands to
#    a markdown pipe table at build time so PDF, HTML, and Word all
#    render identically. Single source of truth — re-run an analysis,
#    overwrite the .csv, rebuild.
#
# Supported formats:
#   csv       comma-separated; converted to a pipe table on load
#   tsv       tab-separated; converted to a pipe table on load
#   markdown  the source file is already a pipe table; inlined verbatim
#   latex     raw .tex tabular fragment; reference via \input{tables/...}
#             inside a ```latex block (no token expansion)
tables:
  subgroup_summary:
    source: tables/subgroup_summary.csv
    format: csv
    provenance:
      description: Effect size by subgroup, generated alongside the primary test.
      source: data/analysis_results.parquet
      command: python scripts/subgroup_summary.py --out tables/subgroup_summary.csv
      updated: "2026-04-21"
